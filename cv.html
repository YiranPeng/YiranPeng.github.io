<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Preview Yiran Peng's CV online and download the PDF if needed."
    />
    <title>Yiran Peng | CV</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top" aria-label="Back to home">Yiran Peng</a>
      <div class="header-actions">
        <nav class="nav" aria-label="Main navigation">
          <a href="index.html#about" data-i18n="nav.about">About</a>
          <a href="index.html#education" data-i18n="nav.education">Education</a>
          <a href="index.html#projects" data-i18n="nav.projects">Projects</a>
          <a href="index.html#work" data-i18n="nav.work">Work</a>
          <a href="index.html#publications" data-i18n="nav.publications">Publications</a>
          <a href="interests.html" data-i18n="nav.interests">Interests</a>
          <a href="index.html#contact" data-i18n="nav.contact">Contact</a>
        </nav>
        <div class="language-switch" aria-label="Language">
          <span data-i18n="language.label">Language</span>
          <button type="button" data-lang-switch="en" aria-pressed="true">EN</button>
          <button type="button" data-lang-switch="zh" aria-pressed="false">ZH</button>
        </div>
      </div>
    </header>

    <main id="top">
      <section class="section cv-section">
        <div class="section-heading">
          <p class="eyebrow" data-i18n="cv.eyebrow">CV Preview</p>
          <h1 data-i18n="cv.title">Yiran Peng CV</h1>
          <p class="section-intro" data-i18n="cv.copy">
            You can preview the PDF here. Use the button below if you want to download a copy.
          </p>
          <a class="button primary" href="resume.pdf" download data-i18n="cv.download">Download CV</a>
        </div>
        <div class="cv-viewer">
          <iframe src="resume.pdf" title="Yiran Peng CV PDF preview"></iframe>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>&copy; <span id="year"></span> Yiran Peng</span>
      <a href="index.html#contact" data-i18n="nav.contact">Contact</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
